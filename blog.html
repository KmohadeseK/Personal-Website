                        <!-- Html code main-menu ul :BLOG [START] -->

                            <a class="navbar-link" href="#blog">BLOG</a>
                            <ul>
                                <li><a href="#blog-home">Blog Home</a></li>

                        </li>
                        <!-- Html code main-menu ul :BLOG [END] -->

                        <!-- Html code main-menu ul :PAGES [START] -->
                        <li>
                            <a class="navbar-link" href="#pages">PAGES</a>

            <!--header-box html [END]-->
        </div>
        <!--header-container html [END]-->
        <div class="title-post tp-post">
            <h1>Blog Archive</h1>
        </div>

        <div class="container-blog">
            <form id="postForm">
                <input type="text" name="title" id="title" placeholder="title"
                    required>
                <select name="category" id="category">
                    <option value="tech">technology</option>
                    <option value="lifestyle">life style</option>
                </select>
                <input type="file" name="image" id="image" accept="image/*">
                <textarea name="content" id="content" placeholder="text post..."
                    required></textarea>
                <button type="submit">Publish post</button>
            </form>

            <div id="blogContainer"></div>

            <div id="postDetailView" style="display: none;">
                <h2 id="detailTitle"></h2>
                <small id="detailCategory"></small>
                <img id="detailImage" src
                    style="max-width: 100%; height: auto; display: none;"
                    alt="picture post">
                <p id="detailContent"></p>
                <button onclick="hidePostDetail()">return</button>
            </div>
        </div>

        <!-------------- SCRIPT JS --------------->
        <script defer src="script.js"></script>
    </body>
</html>
